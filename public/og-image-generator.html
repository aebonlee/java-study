<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JavaMaster OG Image Generator</title>
  <style>
    body { margin: 0; padding: 20px; background: #f5f5f5; font-family: sans-serif; text-align: center; }
    h2 { margin-bottom: 10px; }
    p { color: #666; margin-bottom: 20px; }
    canvas { border: 1px solid #ddd; display: block; margin: 0 auto 16px; }
    button { padding: 12px 24px; background: #5382A1; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    button:hover { background: #E76F00; }
  </style>
</head>
<body>
  <h2>JavaMaster OG Image Generator</h2>
  <p>"PNG 다운로드" 버튼을 눌러 og-image.png를 다운로드한 뒤 public/ 폴더에 저장하세요.</p>
  <canvas id="canvas" width="1200" height="630"></canvas>
  <button onclick="download()">PNG 다운로드 (og-image.png)</button>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // Background gradient
    const grad = ctx.createLinearGradient(0, 0, 1200, 630);
    grad.addColorStop(0, '#0f1f2e');
    grad.addColorStop(0.4, '#1a3a52');
    grad.addColorStop(0.7, '#2d5a7b');
    grad.addColorStop(1, '#3a6d94');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 1200, 630);

    // Decorative circles
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(200, 500, 200, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(1000, 150, 250, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;

    // Floating code text
    ctx.globalAlpha = 0.08;
    ctx.fillStyle = '#ffffff';
    ctx.font = '16px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('public class Main {', 60, 80);
    ctx.fillText('System.out.println("Hello");', 900, 120);
    ctx.fillText('@SpringBootApplication', 80, 560);
    ctx.fillText('interface Runnable {', 850, 550);
    ctx.fillText('List<String> list = new ArrayList<>();', 300, 60);
    ctx.fillText('@Autowired private Service service;', 600, 590);
    ctx.globalAlpha = 1;

    // Logo box
    ctx.fillStyle = '#E76F00';
    roundRect(ctx, 490, 130, 70, 70, 14);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 42px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.fillText('J', 525, 182);

    // Title
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 64px sans-serif';
    ctx.fillText('JavaMaster', 600, 280);

    // Subtitle
    ctx.font = '28px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillText('Java 기초부터 Spring Boot까지', 600, 335);

    // Description
    ctx.font = '20px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText('체계적인 17개 챕터 Java 학습 플랫폼', 600, 375);

    // Tags
    const tags = ['Java 기초', 'OOP', '제네릭/스트림', '서블릿/JSP', 'Spring Boot'];
    const tagWidth = 130;
    const startX = 600 - (tags.length * tagWidth) / 2;
    tags.forEach((tag, i) => {
      const x = startX + i * tagWidth + tagWidth / 2;
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      roundRect(ctx, x - 55, 420, 110, 34, 17);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.font = '14px sans-serif';
      ctx.fillText(tag, x, 442);
    });

    // URL
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '16px sans-serif';
    ctx.fillText('java-study.dreamitbiz.com', 600, 530);

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function download() {
      const link = document.createElement('a');
      link.download = 'og-image.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
